<!DOCTYPE html>
<html>
<head>
    <title>Symbols</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<nav class="om-navbar">
    <a href="/" class="om-navbar-brand">The Olympians</a>
    <a href="/learn" class="om-navbar-link">Learning Hub</a>
</nav>

<div class="om-page">
    <div class="om-card">

        <div class="god-hero">
            <div class="god-hero-icon">🔮</div>
            <div class="god-hero-name">Symbols</div>
            <div class="god-hero-title">Icons of the Gods</div>
        </div>

        <img src="{{ url_for('static', filename='images/symbols.png') }}" class="lesson-image lesson-image-symbols" alt="Symbols">

        <div class="info-section">
            <div class="info-section-title">Overview</div>
            <div class="info-item"><span class="info-item-icon">💫</span><span>Symbols help identify each god at a glance</span></div>
            <div class="info-item"><span class="info-item-icon">💫</span><span>Each symbol represents a god's powers and personality</span></div>
        </div>

        <div class="info-section">
            <div class="info-section-title">Examples</div>
            <div class="info-item"><span class="info-item-icon">⚡</span><span>Zeus — Thunderbolt</span></div>
            <div class="info-item"><span class="info-item-icon">🔱</span><span>Poseidon — Trident</span></div>
            <div class="info-item"><span class="info-item-icon">🦉</span><span>Athena — Owl</span></div>
            <div class="info-item"><span class="info-item-icon">🕊️</span><span>Aphrodite — Dove</span></div>
        </div>

        <hr class="om-divider">

        <div class="om-page-nav">
            <a href="/learn/relationships" class="om-btn om-btn-outline">← Back</a>
            <form method="POST" action="/learn/complete/symbols">
                <button type="submit" class="om-btn om-btn-primary">Finish Learning →</button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
