<!DOCTYPE html>
<html>
<head>
    <title>Greek Mythology - The Olympians</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .hero {
            max-width: 600px;
            margin: 80px auto;
            text-align: center;
            padding: 0 16px;
        }
        .hero-icon { font-size: 56px; }
        .hero p { color: var(--grey-light); margin-bottom: 40px; }

        .flow-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 48px;
            flex-wrap: nowrap;
        }
        .flow-step {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            text-align: center;
            min-width: 90px;
        }
        .flow-step-icon { font-size: 24px; }
        .flow-step-label { font-size: 13px; color: var(--grey-light); margin-top: 6px; }
        .flow-arrow { font-size: 18px; color: var(--border); }
    </style>
</head>
<body>

<nav class="om-navbar">
    <a href="/" class="om-navbar-brand">The Olympians</a>
</nav>

<div class="hero">
    <div class="hero-icon">⚡</div>
    <h1>Greek Mythology</h1>
    <h2 style="font-family: 'Playfair Display', serif; 
           font-size: 1.6rem; 
           color: var(--dark); 
           font-weight: 400;
           margin-bottom: 16px;">The Olympians</h2>
    <p>
        Discover the gods of Mount Olympus. Learn their powers and symbols,
        pass the checkpoint, and test your knowledge with the final quiz.
    </p>
    <a href="/start/learn" class="om-btn om-btn-primary om-btn-lg">Begin Your Journey</a>

    <div class="flow-row">
        <div class="flow-step">
            <div class="flow-step-icon">📖</div>
            <div class="flow-step-label">Learn the Gods</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">
            <div class="flow-step-icon">🔗</div>
            <div class="flow-step-label">Match Symbols</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">
            <div class="flow-step-icon">❓</div>
            <div class="flow-step-label">Take the Quiz</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">
            <div class="flow-step-icon">🏆</div>
            <div class="flow-step-label">Final Quiz</div>
        </div>
    </div>
</div>

</body>
</html>
