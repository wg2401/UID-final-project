<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - Question {{ question_num }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>{{ title }}</h2>
    <p>Question {{ question_num }} of {{ total }}</p>
    <hr>

    <h4>{{ question.question }}</h4>

    <form method="POST">
        {% if question.type == "text" %}
            <div class="mb-3">
                <input type="text" class="form-control" name="text_answer" placeholder="Type your answer here" required>
            </div>
        {% else %}
            {% for choice in question.choices %}
            <div class="form-check">
                <input class="form-check-input" type="radio" name="choice" value="{{ choice }}" id="{{ choice }}" required>
                <label class="form-check-label" for="{{ choice }}">{{ choice }}</label>
            </div>
            {% endfor %}
        {% endif %}

        <br>
        <button type="submit" class="btn btn-primary">
            {% if question_num == total %}
                Submit Quiz
            {% else %}
                Next Question
            {% endif %}
        </button>
    </form>

    <br>
    <a href="/">Home</a>
</div>
</body>
</html>
